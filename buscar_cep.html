<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar CEP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        input {
            padding: 5px;
            font-size: 16px;
        }
        button {
            padding: 5px 10px;
            font-size: 16px;
        }
        #cep{
            width: 250px;
        }
        #result p {
            margin: 5px 0;
        }    
    </style>
</head>
<body>
    <h1>Buscar CEP</h1>
    <form id="cepForm">
        <input type="text" id="cep" placeholder="Digite apenas os números do CEP" maxlength="8">
        <button type="submit">Buscar</button>
    </form>
    <div id="result"></div>
    <script>
        document.getElementById('cepForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const cep = document.getElementById('cep').value;
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.erro) {
                            document.getElementById('result').innerHTML = 'CEP não encontrado.';
                        } else {
                            console.log(data);
                            document.getElementById('result').innerHTML = `
                                <p>Logradouro: ${data.logradouro}</p>
                                <p>Bairro: ${data.bairro}</p>
                                <p>Cidade: ${data.localidade}</p>
                                <p>Estado: ${data.uf}</p>
                            `;
                        }
                    })
                    .catch(error => {
                        document.getElementById('result').innerHTML = 'Erro ao buscar o CEP.';
                    });
            } else {
                document.getElementById('result').innerHTML = 'Por favor, digite um CEP válido com 8 dígitos.';
            }
        });
    </script>
</body>
</html>
